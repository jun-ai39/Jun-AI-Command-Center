name: Update dashboard data and deploy Pages

on:
  # mainブランチの画面変更も自動公開します。
  push:
    branches:
      - main
  # 日本時間の毎朝6:17（UTCでは前日の21:17）に実行します。
  schedule:
    - cron: "17 21 * * *"
  # GitHubのActions画面から手動実行できます。
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-news-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Update news data
        if: github.event_name != 'push'
        run: python python/update_news.py

      - name: Update market data
        if: github.event_name != 'push'
        run: python python/update_market.py

      - name: Build rule-based morning briefing
        if: github.event_name != 'push'
        run: python python/update_briefing.py

      - name: Commit updated dashboard data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/market.json data/briefing.json
          if git diff --cached --quiet; then
            echo "Dashboard data has not changed."
          else
            git commit -m "chore: update dashboard data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
